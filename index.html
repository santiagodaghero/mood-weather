<!DOCTYPE html>
<html lang='es'>
<head>
    <meta charset='utf-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <title>Mood Weather</title>
    <link rel='stylesheet' href='Weather.css'>
    
</head>
<body>
  <main>
  <div class="wrapper">
    <h1 class="title">☁️ MOOD WEATHER</h1>

    <div class="container">
 
      <!-- Barra superior -->
      <div class="top-bar">
        <span class="time">9:41</span>
        <span class="location">📍 Buenos Aires</span>
      </div>
 
      <!-- Ciudad -->
      <h2 class="city">Buenos Aires</h2>
 
      <!-- Icono del clima -->
      <span class="icon"></span>
 
      <!-- Temperatura -->
      <span class="temp">28°</span>
 
      <!-- Condición -->
      <h2 class="cond">Soleado</h2>
 
      <!-- Cards de datos -->
      <div class="cards">
        <div class="card">
          <span class="card-num">68%</span>
          <span class="card-text">Humedad</span>
        </div>
        <div class="card">
          <span class="card-num">21 km/h</span>
          <span class="card-text">Viento</span>
        </div>
        <div class="card">
          <span class="card-num">UV 8</span>
          <span class="card-text">Sencación</span>
        </div>
      </div>
 
      <!-- Botón de idioma -->
      <button class="lang-btn">ES → EN</button>
 
    </div>
  </main>
 
  <script src="app.js"></script>
</body>
</html>
